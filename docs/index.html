/* ============================================================
   APP LOGIC
   ============================================================ */
const state = { data: [], lang: "all", sort: "recency", source: "all", cats: new Set(), q: "" };

// Safe storage — sandboxed preview frames throw on localStorage access, which must not halt the app.
const store = {
  get(k){ try { return localStorage.getItem(k); } catch { return null; } },
  set(k,v){ try { localStorage.setItem(k,v); } catch {} },
};

// Feedback (thumbs up/down) — persisted so Phase 2 can learn your preferences.
let votes = {};
try { votes = JSON.parse(store.get('briefing_feedback') || '{}') || {}; } catch { votes = {}; }
function saveVotes(){ store.set('briefing_feedback', JSON.stringify(votes)); updateFbCount(); }
function updateFbCount(){ const el = document.getElementById('fbCount'); if (el) el.textContent = Object.keys(votes).length; }
function handleVote(id, dir){
  if (votes[id] === dir) delete votes[id]; else votes[id] = dir;
  saveVotes(); render();
}
function exportFeedback(){
  const rows = state.data
    .map(a => ({ title:a.title, source:a.source, category:a.category, language:a.language, link:a.link, vote: votes[a.link] || null }))
    .filter(r => r.vote);
  if (!rows.length){ toast('No feedback yet — tap 👍 / 👎 on stories first.'); return; }
  const blob = new Blob([JSON.stringify(rows, null, 2)], { type:'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href = url; a.download = 'briefing-feedback.json'; a.click();
  URL.revokeObjectURL(url);
}

// anchor "now" to the newest article so relative times always read naturally in the demo
function computeNow(data){ return Math.max(...data.map(d => +new Date(d.published))); }
let NOW = Date.now();

function relTime(iso){
  const diff = Math.max(0, NOW - +new Date(iso));
  const m = Math.round(diff/60000), h = Math.round(diff/3600000), d = Math.round(diff/86400000);
  if (m < 60) return `${m||1}m ago`;
  if (h < 24) return `${h}h ago`;
  return `${d}d ago`;
}
function fmtClock(iso){
  const dt = new Date(iso);
  return dt.toLocaleString(undefined, { month:'short', day:'numeric', hour:'2-digit', minute:'2-digit' });
}

function esc(s){ return s.replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

function relevanceBar(score){
  const color = score >= 90 ? 'bg-emerald-500' : score >= 80 ? 'bg-teal-500' : score >= 70 ? 'bg-amber-500' : 'bg-slate-400';
  return `<div class="flex items-center gap-1.5" title="Relevance ${score}/100">
    <div class="h-1.5 w-14 rounded-full bg-slate-200 dark:bg-slate-700 overflow-hidden">
      <div class="h-full ${color}" style="width:${score}%"></div>
    </div>
    <span class="text-[11px] tabular-nums text-slate-500 dark:text-slate-400">${score}</span>
  </div>`;
}

    : '';
  const v = votes[a.link];
  const ring = v === 'up' ? 'ring-2 ring-emerald-400/50 ' : v === 'down' ? 'opacity-60 ' : '';
  const upCls = v === 'up'
    ? 'bg-emerald-100 text-emerald-600 dark:bg-emerald-500/20 dark:text-emerald-400'
    : 'text-slate-400 hover:text-emerald-500 hover:bg-slate-100 dark:hover:bg-slate-800';
  const downCls = v === 'down'
    ? 'bg-rose-100 text-rose-600 dark:bg-rose-500/20 dark:text-rose-400'
    : 'text-slate-400 hover:text-rose-500 hover:bg-slate-100 dark:hover:bg-slate-800';
  const id = esc(a.link);
  return `<article class="card-enter group flex flex-col rounded-2xl bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 p-4 hover:shadow-lg hover:border-slate-300 dark:hover:border-slate-700 transition ${ring}">
    <div class="flex items-center gap-2 text-xs">
      <span class="font-semibold text-slate-700 dark:text-slate-300">${esc(a.source)}</span>
      ${langBadge}
      <span class="ml-auto text-slate-400" title="${fmtClock(a.published)}">${relTime(a.published)}</span>
    </div>
    <span class="mt-3 self-start text-[11px] font-semibold px-2 py-0.5 rounded-full ${CAT_STYLE[a.category]||'bg-slate-200 text-slate-700'}">${esc(a.category)}</span>
    <a href="${id}" target="_blank" rel="noopener" class="mt-2 font-bold leading-snug text-slate-900 dark:text-white group-hover:text-brand dark:group-hover:text-brand-dark transition">${esc(a.title)}</a>
    <p class="mt-2 text-sm text-slate-600 dark:text-slate-400 clamp-4">${esc(a.summary)}</p>
    <div class="mt-4 pt-3 border-t border-slate-100 dark:border-slate-800 flex items-center gap-2">
      ${relevanceBar(a.relevance_score)}
      ${lightBadge}
      <div class="ml-auto flex items-center gap-1">
        <button class="vote h-7 w-7 grid place-items-center rounded-lg transition ${upCls}" data-id="${id}" data-vote="up" title="More like this" aria-label="Thumbs up">
          <svg class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${THUMB}</svg>
        </button>
        <button class="vote h-7 w-7 grid place-items-center rounded-lg transition ${downCls}" data-id="${id}" data-vote="down" title="Fewer like this" aria-label="Thumbs down">
          <svg class="h-4 w-4 rotate-180" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${THUMB}</svg>
        </button>
        <a href="${id}" target="_blank" rel="noopener" class="h-7 w-7 grid place-items-center rounded-lg text-slate-400 hover:text-brand dark:hover:text-brand-dark hover:bg-slate-100 dark:hover:bg-slate-800 transition" title="Read original">
          <svg class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M7 17 17 7M7 7h10v10"/></svg>
        </a>
      </div>
    </div>
  </article>`;
}

function applyFilters(){
  let rows = state.data.filter(a => {
    if (state.lang !== 'all' && a.language !== state.lang) return false;
    if (state.source !== 'all' && a.source !== state.source) return false;
    if (state.cats.size && !state.cats.has(a.category)) return false;
    if (state.q){
      const hay = (a.title + ' ' + a.summary + ' ' + a.source).toLowerCase();
      if (!hay.includes(state.q)) return false;
    }
    return true;
  });
  rows.sort((a,b) => state.sort === 'relevance'
    ? b.relevance_score - a.relevance_score || (+new Date(b.published) - +new Date(a.published))
    : (+new Date(b.published) - +new Date(a.published)));
  return rows;
}

function render(){
  const rows = applyFilters();
  const grid = document.getElementById('grid');
  grid.innerHTML = rows.map(card).join('');
  document.getElementById('empty').classList.toggle('hidden', rows.length > 0);
  document.getElementById('count').textContent = `${rows.length} ${rows.length === 1 ? 'story' : 'stories'}`;
  const anyFilter = state.lang!=='all' || state.sort!=='recency' || state.source!=='all' || state.cats.size || state.q;
  document.getElementById('clearBtn').classList.toggle('hidden', !anyFilter);
  // refresh segmented styling
  syncSeg();
}

function syncSeg(){
  document.querySelectorAll('#langSeg .seg').forEach(b => setActive(b, b.dataset.lang === state.lang));
  document.querySelectorAll('#sortSeg .seg').forEach(b => setActive(b, b.dataset.sort === state.sort));
  document.querySelectorAll('#catChips .chip').forEach(b => {
    const on = b.dataset.cat === '__all__' ? state.cats.size === 0 : state.cats.has(b.dataset.cat);
    b.className = 'chip whitespace-nowrap text-xs font-medium px-3 py-1.5 rounded-full border transition ' +
      (on ? 'bg-brand text-white border-brand dark:bg-brand-dark dark:border-brand-dark'
          : 'bg-white dark:bg-slate-900 text-slate-600 dark:text-slate-300 border-slate-200 dark:border-slate-800 hover:border-slate-300 dark:hover:border-slate-700');
  });
}
function setActive(btn, on){
  btn.className = 'seg px-3 py-1.5 font-medium transition ' +
    (btn.previousElementSibling ? 'border-l border-slate-200 dark:border-slate-800 ' : '') +
    (on ? 'bg-brand text-white dark:bg-brand-dark' : 'bg-white dark:bg-slate-900 text-slate-600 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-800');
}

function buildControls(){
  // category chips
  const chips = document.getElementById('catChips');
  const all = `<button data-cat="__all__" class="chip">All topics</button>`;
  chips.innerHTML = all + CATEGORIES.map(c => `<button data-cat="${c}" class="chip">${c}</button>`).join('');
  chips.addEventListener('click', e => {
    const b = e.target.closest('.chip'); if(!b) return;
    if (b.dataset.cat === '__all__') state.cats.clear();
    else { state.cats.has(b.dataset.cat) ? state.cats.delete(b.dataset.cat) : state.cats.add(b.dataset.cat); }
    render();
  });
  // sources (options are (re)built on each data load by buildSourceOptions)
  document.getElementById('sourceSel').addEventListener('change', e => { state.source = e.target.value; render(); });
  // language + sort
  document.getElementById('langSeg').addEventListener('click', e => {
    const b = e.target.closest('.seg'); if(!b) return; state.lang = b.dataset.lang; render();
  });
  document.getElementById('sortSeg').addEventListener('click', e => {
    const b = e.target.closest('.seg'); if(!b) return; state.sort = b.dataset.sort; render();
  });
  // votes (thumbs up/down) — event delegation on the grid
  document.getElementById('grid').addEventListener('click', e => {
    const b = e.target.closest('.vote'); if(!b) return;
    e.preventDefault();
    handleVote(b.dataset.id, b.dataset.vote);
    toast(b.dataset.vote === 'up' ? 'Got it — more like this 👍' : 'Noted — fewer like this 👎');
  });
  // export feedback
  document.getElementById('exportFb').addEventListener('click', exportFeedback);
  // search
  document.getElementById('search').addEventListener('input', e => { state.q = e.target.value.trim().toLowerCase(); render(); });
  // clear
  document.getElementById('clearBtn').addEventListener('click', () => {
    state.lang='all'; state.sort='recency'; state.source='all'; state.cats.clear(); state.q='';
    document.getElementById('search').value=''; document.getElementById('sourceSel').value='all'; render();
  });
}

// theme
function initTheme(){
  const saved = store.get('theme');
  let prefersDark = false;
  try { prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches; } catch {}
  const dark = saved ? saved === 'dark' : prefersDark;
  document.documentElement.classList.toggle('dark', !!dark);
  document.getElementById('themeBtn').addEventListener('click', () => {
    const d = document.documentElement.classList.toggle('dark');
    store.set('theme', d ? 'dark' : 'light');
  });
}

// toast
function toast(msg){
  const t = document.getElementById('toast');
  t.firstElementChild.textContent = msg;
  t.style.opacity = '1'; t.style.transform = 'translate(-50%, -6px)';
  clearTimeout(t._t);
  t._t = setTimeout(() => { t.style.opacity='0'; t.style.transform='translate(-50%,0)'; }, 2600);
}

function buildSourceOptions(){
  const sel = document.getElementById('sourceSel');
  const cur = state.source;
  sel.innerHTML = '<option value="all">All sources</option>';
  [...new Set(state.data.map(d => d.source))].sort().forEach(s => {
    const o = document.createElement('option'); o.value = s; o.textContent = s; sel.appendChild(o);
  });
  if ([...sel.options].some(o => o.value === cur)) sel.value = cur; else state.source = 'all';
}

// Load the live feed (served by GitHub Pages); fall back to embedded mock for local double-click.
let lastLinks = new Set();
async function loadData({ announce = false } = {}){
  let data = MOCK, ok = false;
  try {
    const r = await fetch('news.json', { cache: 'no-store' });
    if (r.ok) { const j = await r.json(); data = Array.isArray(j) ? j : (j.articles || MOCK); ok = true; }
  } catch {}
  const fresh = announce ? data.filter(a => !lastLinks.has(a.link)).length : 0;
  state.data = data;
  lastLinks = new Set(data.map(a => a.link));
  NOW = Date.now();
  const newest = data.reduce((m, a) => Math.max(m, +new Date(a.published || 0) || 0), 0);
  document.getElementById('updated-text').textContent = newest ? 'Updated ' + relTime(new Date(newest).toISOString()) : 'Updated —';
  buildSourceOptions();
  render();
  return { ok, fresh };
}

// boot
async function boot(){
  initTheme();
  buildControls();
  await loadData();
  updateFbCount();

  const btn = document.getElementById('refreshBtn');
  const icon = btn.querySelector('svg');
  btn.addEventListener('click', async () => {
    btn.classList.add('opacity-70', 'pointer-events-none');
    icon.classList.add('animate-spin');
    const { ok, fresh } = await loadData({ announce: true });
    icon.classList.remove('animate-spin');
    btn.classList.remove('opacity-70', 'pointer-events-none');
    if (!ok)            toast('Could not reach the feed — check your connection.');
    else if (fresh > 0) toast(`${fresh} new ${fresh === 1 ? 'story' : 'stories'} loaded.`);
    else                toast("You're up to date.");
  });

  // Quietly check for new stories every 10 minutes (the cloud routine publishes 2×/day).
  setInterval(() => loadData({ announce: true }).then(({ fresh }) => {
    if (fresh > 0) toast(`${fresh} new ${fresh === 1 ? 'story' : 'stories'} just arrived.`);
  }), 10 * 60 * 1000);
}
boot();
</script>
